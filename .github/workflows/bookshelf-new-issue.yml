name: "Bookshelf Action: New Issue"
on:
  issues:
    types: [opened]
permissions:
  contents: write
  issues: write
jobs:
  bookshelf-action:
    name: Bookshelf Action
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
      - name: Run Bookshelf Action
        uses: bhaumikmistry/bookshelf-action@master
        with:
          command: "onNewIssue"
        env:
          GITHUB_TOKEN: ${{ github.token }}
